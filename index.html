<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHIKV R0 Explorer</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d0d5dd;
      --panel: #f8fafc;
      --blue: #2563eb;
      --green: #16803c;
      --warn: #b54708;
      --warn-bg: #fffaeb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding: 24px 28px 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 920px;
      line-height: 1.5;
    }

    main {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      min-height: calc(100vh - 100px);
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
    }

    section {
      padding: 20px 24px;
      min-width: 0;
    }

    .control {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 650;
      margin-bottom: 6px;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      font-size: 14px;
      background: #ffffff;
      color: var(--ink);
    }

    .range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .plot-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 680px;
      height: 500px;
    }

    .axis {
      stroke: #344054;
      stroke-width: 1;
    }

    .grid {
      stroke: #eaecf0;
      stroke-width: 1;
    }

    .curve {
      fill: none;
      stroke-width: 3;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .tick-label,
    .axis-label {
      fill: #344054;
      font-size: 12px;
    }

    .axis-label {
      font-weight: 650;
    }

    .warning {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #fedf89;
      border-radius: 8px;
      background: var(--warn-bg);
      color: var(--warn);
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .summary {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CHIKV R0 Explorer</h1>
    <p>Choose a mosquito species, thermal response functions, and temperature range. The plot recalculates directly from the selected functions.</p>
  </header>

  <main>
    <aside>
      <div class="control">
        <label for="species">Mosquito species</label>
        <select id="species">
          <option value="aegypti">Ae. aegypti</option>
          <option value="albopictus">Ae. albopictus</option>
        </select>
      </div>

      <div class="control range">
        <div>
          <label for="tempMin">Min temp (C)</label>
          <input id="tempMin" type="number" value="15" min="-10" max="50" step="0.1">
        </div>
        <div>
          <label for="tempMax">Max temp (C)</label>
          <input id="tempMax" type="number" value="36" min="-10" max="50" step="0.1">
        </div>
      </div>

      <div class="control">
        <label for="a">Biting rate, a(T)</label>
        <select id="a"></select>
      </div>

      <div class="control">
        <label for="b">Vector-to-human transmission, b(T)</label>
        <select id="b"></select>
      </div>

      <div class="control">
        <label for="c">Human-to-vector transmission, c(T)</label>
        <select id="c"></select>
      </div>

      <div class="control">
        <label for="mu">Adult mortality, mu(T)</label>
        <select id="mu"></select>
      </div>

      <div class="control">
        <label for="pdr">Development rate, PDR(T)</label>
        <select id="pdr"></select>
      </div>

      <div class="control">
        <label for="efd">Fecundity, EFD(T)</label>
        <select id="efd"></select>
      </div>

      <div class="control">
        <label for="pea">Egg-adult survival, pEA(T)</label>
        <select id="pea"></select>
      </div>

      <div class="control">
        <label for="mdr">Mosquito development, MDR(T)</label>
        <select id="mdr"></select>
      </div>

      <div class="control range">
        <div>
          <label for="N">N</label>
          <input id="N" type="number" value="1" min="0" step="0.1">
        </div>
        <div>
          <label for="r">r</label>
          <input id="r" type="number" value="1" min="0" step="0.01">
        </div>
      </div>
    </aside>

    <section>
      <div class="plot-wrap">
        <svg id="plot" viewBox="0 0 900 500" role="img" aria-label="R0 temperature plot"></svg>
      </div>
      <div id="summary" class="summary"></div>
      <div id="warning" class="warning" style="display: none;"></div>
    </section>
  </main>

  <script>
    const traits = {
      a: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 13.35, 40.08) ? 2.02e-4 * T * (T - 13.35) * Math.sqrt(40.08 - T) : 0,
          "Caminade/Focks/Scott": T => T >= 21 && T <= 32 ? 0.0943 + 0.0043 * T : 0
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 10.25, 38.32) ? 1.93e-4 * T * (T - 10.25) * Math.sqrt(38.32 - T) : 0,
          "Caminade/Scott": T => 0.5 * (0.0043 * T + 0.0943)
        }
      },
      b: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 17.05, 35.83) ? 8.49e-4 * T * (T - 17.05) * Math.sqrt(35.83 - T) : 0,
          "Lambrechts 2011": T => T >= 12.4 && T <= 26.1 ? -0.9037 + 0.0729 * T : (T > 26.1 && T <= 32.5 ? 1 : 0)
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 15.84, 36.40) ? 7.35e-4 * T * (T - 15.84) * Math.sqrt(36.40 - T) : 0
        }
      },
      c: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 12.22, 37.46) ? 4.91e-4 * T * (T - 12.22) * Math.sqrt(37.46 - T) : 0,
          "Lambrechts 2011": T => inRange(T, 12.286, 32.461) ? 0.001044 * T * (T - 12.286) * Math.sqrt(32.461 - T) : 0
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 3.62, 36.82) ? 4.39e-4 * T * (T - 3.62) * Math.sqrt(36.82 - T) : 0
        }
      },
      mu: {
        aegypti: {
          "Mordecai 2017 from lifespan": T => inRange(T, 9.16, 37.73) ? 1 / (-1.48e-1 * (T - 9.16) * (T - 37.73)) : 0,
          "Caminade 2017": T => T < 22 ? 1 / (1.22 + Math.exp(-3.05 + 0.72 * T)) + 0.196 : 1 / (1.14 + Math.exp(51.4 - 1.3 * T)) + 0.192,
          "Focks/Yang": T => 0.8692 - 0.1590 * T + 0.01116 * T ** 2 - 0.0003408 * T ** 3 + 0.000003809 * T ** 4
        },
        albopictus: {
          "Mordecai 2017 from lifespan": T => inRange(T, 13.41, 31.51) ? 1 / (-1.43 * (T - 13.41) * (T - 31.51)) : 0,
          "Poletti 2011": T => 0.031 + 95820 * Math.exp(T - 50.4),
          "Ruiz-Moreno 2012": T => T < -5 ? 0 : (T < 15 ? 1 / (5.6 + 1.12 * T) : (T < 38.5 ? 1 / (40.27 - 1.38 * T + 0.01 * T ** 2) : 0)),
          "Brady/Caminade/Zardini": T => T < 15 ? 1 / (1.1 + Math.exp(-4.04 + 0.576 * T)) + 0.12 : (T < 26.3 ? 0.000339 * T ** 2 - 0.0189 * T + 0.336 : 1 / (1.065 + Math.exp(32.2 - 0.92 * T)) + 0.0747),
          "Ng 2017": T => 1.33048 - 2.32772e-1 * T + 1.68529e-2 * T ** 2 - 5.61719e-4 * T ** 3 + 7.91643e-6 * T ** 4 - 2.72e-8 * T ** 5
        }
      },
      pdr: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 10.68, 45.90) ? 6.65e-5 * T * (T - 10.68) * Math.sqrt(45.90 - T) : 0,
          "Focks 1995": T => 1 / (4 + Math.exp(5.15 - 0.123 * T))
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 10.39, 43.05) ? 1.09e-4 * T * (T - 10.39) * Math.sqrt(43.05 - T) : 0,
          "Chan & Johansson 2012": T => 1 / Math.exp(Math.log(6) * Math.exp(-0.08 * (T - 28))),
          "Chan & Johansson 2012 alt": T => 1 / (3.0 * Math.exp(-0.21 * (T - 28.0))),
          "Ruiz-Moreno 2012": T => 1 / (T < 10 ? 4 : (T <= 32 ? 113 / 22 - (2.4 / 22) * T : 1.5))
        }
      },
      efd: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 14.58, 34.61) ? 8.56e-3 * T * (T - 14.58) * Math.sqrt(34.61 - T) : 0,
          "Yang 2009": T => -341.8585 + 108.7373 * T - 12.3447 * T ** 2 + 0.6367451 * T ** 3 - 0.0149469 * T ** 4 + 0.0001294166 * T ** 5
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 8.02, 35.65) ? 4.88e-2 * T * (T - 8.02) * Math.sqrt(35.65 - T) : 0
        }
      },
      pea: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 13.56, 38.29) ? 5.99e-3 * (T - 13.56) * (38.29 - T) : 0
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 9.04, 39.33) ? -3.61e-3 * (T - 9.04) * (T - 39.33) : 0
        }
      },
      mdr: {
        aegypti: {
          "Mordecai 2017": T => inRange(T, 11.36, 39.17) ? 7.86e-5 * T * (T - 11.36) * Math.sqrt(39.17 - T) : 0,
          "Zhu 2019": T => (0.131 - 0.05723 * T + 0.01164 * T ** 2 - 0.001341 * T ** 3 + 8.723e-5 * T ** 4 - 3.017e-6 * T ** 5 + 5.153e-8 * T ** 6 - 3.42e-10 * T ** 7) / 7
        },
        albopictus: {
          "Mordecai 2017": T => inRange(T, 8.60, 39.66) ? 6.38e-5 * T * (T - 8.60) * Math.sqrt(39.66 - T) : 0
        }
      }
    };

    const ids = ["a", "b", "c", "mu", "pdr", "efd", "pea", "mdr"];
    const defaultChoices = {
      a: "Mordecai 2017",
      b: "Mordecai 2017",
      c: "Mordecai 2017",
      mu: "Mordecai 2017 from lifespan",
      pdr: "Mordecai 2017",
      efd: "Mordecai 2017",
      pea: "Mordecai 2017",
      mdr: "Mordecai 2017"
    };

    function inRange(T, lower, upper) {
      return T > lower && T < upper;
    }

    function selected(id) {
      return document.getElementById(id).value;
    }

    function fillSelectors() {
      const species = selected("species");
      ids.forEach(id => {
        const select = document.getElementById(id);
        const current = select.value || defaultChoices[id];
        select.innerHTML = "";
        Object.keys(traits[id][species]).forEach(name => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
        select.value = traits[id][species][current] ? current : Object.keys(traits[id][species])[0];
      });
      updatePlot();
    }

    function makeTemps(minTemp, maxTemp) {
      const temps = [];
      const step = 0.1;
      for (let T = minTemp; T <= maxTemp + 1e-9; T += step) {
        temps.push(Math.round(T * 10) / 10);
      }
      return temps;
    }

    function calculate() {
      const species = selected("species");
      const minTemp = Number(document.getElementById("tempMin").value);
      const maxTemp = Number(document.getElementById("tempMax").value);
      const N = Number(document.getElementById("N").value);
      const r = Number(document.getElementById("r").value);
      const temps = makeTemps(Math.min(minTemp, maxTemp), Math.max(minTemp, maxTemp));
      const rows = [];
      const checks = {
        nonFiniteInput: {},
        nonFiniteR0: 0
      };

      temps.forEach(T => {
        const vals = {};
        ids.forEach(id => {
          vals[id] = traits[id][species][selected(id)](T);
        });

        const R0 = Math.sqrt(
          (
            vals.a ** 2 *
            vals.b *
            vals.c *
            Math.exp(-(vals.mu / vals.pdr)) *
            vals.efd *
            vals.pea *
            vals.mdr
          ) /
          (N * r * vals.mu ** 3)
        );

        Object.entries(vals).forEach(([key, value]) => {
          if (!Number.isFinite(value)) {
            checks.nonFiniteInput[key] = (checks.nonFiniteInput[key] || 0) + 1;
          }
        });

        if (!Number.isFinite(N)) {
          checks.nonFiniteInput.N = (checks.nonFiniteInput.N || 0) + 1;
        }

        if (!Number.isFinite(r)) {
          checks.nonFiniteInput.r = (checks.nonFiniteInput.r || 0) + 1;
        }

        if (!Number.isFinite(R0)) {
          checks.nonFiniteR0 += 1;
        }

        rows.push({ temp: T, R0, vals });
      });

      return { rows, checks, species };
    }

    function updatePlot() {
      const result = calculate();
      drawPlot(result.rows, result.species);
      updateSummary(result);
    }

    function updateSummary(result) {
      const finiteRows = result.rows.filter(d => Number.isFinite(d.R0));
      const summary = document.getElementById("summary");
      const warning = document.getElementById("warning");

      if (finiteRows.length === 0) {
        summary.textContent = `Undefined R0 values: ${result.rows.length} of ${result.rows.length}. No finite R0 values in the selected temperature range.`;
      } else {
        const undefinedCount = result.rows.length - finiteRows.length;
        const peak = finiteRows.reduce((best, d) => d.R0 > best.R0 ? d : best, finiteRows[0]);
        summary.textContent = `Undefined R0 values: ${undefinedCount} of ${result.rows.length}. Peak finite R0 = ${format(peak.R0)} at ${peak.temp.toFixed(1)} C.`;
      }

      const checkLines = [];
      addCheckSection(checkLines, "Input values non-finite", result.checks.nonFiniteInput);

      if (result.checks.nonFiniteR0 > 0) {
        checkLines.push(`R0 non-finite: ${result.checks.nonFiniteR0} temperature values`);
      }

      if (checkLines.length > 0) {
        warning.style.display = "block";
        warning.textContent = "Checks from direct calculation:\n" + checkLines.join("\n");
      } else {
        warning.style.display = "none";
        warning.textContent = "";
      }
    }

    function addCheckSection(lines, title, values) {
      const entries = Object.entries(values).sort((a, b) => b[1] - a[1]);

      if (entries.length === 0) {
        return;
      }

      lines.push(title + ":");
      entries.forEach(([name, count]) => {
        lines.push(`  ${name}: ${count} temperature values`);
      });
    }

    function drawPlot(rows, species) {
      const svg = document.getElementById("plot");
      const width = 900;
      const height = 500;
      const margin = { top: 32, right: 26, bottom: 62, left: 72 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const finite = rows.filter(d => Number.isFinite(d.R0));
      const xMin = Math.min(...rows.map(d => d.temp));
      const xMax = Math.max(...rows.map(d => d.temp));
      const yMaxRaw = finite.length ? Math.max(...finite.map(d => d.R0)) : 1;
      const yMax = yMaxRaw > 0 ? yMaxRaw * 1.08 : 1;
      const color = species === "aegypti" ? "#2563eb" : "#16803c";

      const x = T => margin.left + ((T - xMin) / (xMax - xMin || 1)) * plotW;
      const y = value => margin.top + plotH - (value / yMax) * plotH;

      svg.innerHTML = "";

      for (let i = 0; i <= 5; i++) {
        const gx = margin.left + (plotW * i) / 5;
        const tx = xMin + ((xMax - xMin) * i) / 5;
        line(svg, gx, margin.top, gx, margin.top + plotH, "grid");
        text(svg, gx, margin.top + plotH + 22, tx.toFixed(1), "tick-label", "middle");
      }

      for (let i = 0; i <= 5; i++) {
        const gy = margin.top + plotH - (plotH * i) / 5;
        const ty = (yMax * i) / 5;
        line(svg, margin.left, gy, margin.left + plotW, gy, "grid");
        text(svg, margin.left - 10, gy + 4, format(ty), "tick-label", "end");
      }

      line(svg, margin.left, margin.top + plotH, margin.left + plotW, margin.top + plotH, "axis");
      line(svg, margin.left, margin.top, margin.left, margin.top + plotH, "axis");
      text(svg, margin.left + plotW / 2, height - 18, "Temperature (C)", "axis-label", "middle");
      text(svg, 18, margin.top + plotH / 2, "Relative R0(T)", "axis-label", "middle", -90);

      const title = species === "aegypti" ? "Ae. aegypti" : "Ae. albopictus";
      text(svg, margin.left, 22, `R0(T) for ${title}`, "axis-label", "start");

      let path = "";
      let drawing = false;
      rows.forEach(d => {
        if (!Number.isFinite(d.R0)) {
          drawing = false;
          return;
        }
        const command = drawing ? "L" : "M";
        path += `${command}${x(d.temp).toFixed(2)},${y(d.R0).toFixed(2)} `;
        drawing = true;
      });

      const curve = document.createElementNS("http://www.w3.org/2000/svg", "path");
      curve.setAttribute("d", path);
      curve.setAttribute("class", "curve");
      curve.setAttribute("stroke", color);
      svg.appendChild(curve);
    }

    function line(svg, x1, y1, x2, y2, cls) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "line");
      el.setAttribute("x1", x1);
      el.setAttribute("y1", y1);
      el.setAttribute("x2", x2);
      el.setAttribute("y2", y2);
      el.setAttribute("class", cls);
      svg.appendChild(el);
    }

    function text(svg, x, y, value, cls, anchor, rotate = 0) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "text");
      el.setAttribute("x", x);
      el.setAttribute("y", y);
      el.setAttribute("class", cls);
      el.setAttribute("text-anchor", anchor);
      if (rotate !== 0) {
        el.setAttribute("transform", `rotate(${rotate} ${x} ${y})`);
      }
      el.textContent = value;
      svg.appendChild(el);
    }

    function format(value) {
      if (!Number.isFinite(value)) return String(value);
      if (Math.abs(value) >= 100) return value.toFixed(0);
      if (Math.abs(value) >= 10) return value.toFixed(1);
      if (Math.abs(value) >= 1) return value.toFixed(2);
      return value.toPrecision(2);
    }

    document.getElementById("species").addEventListener("change", fillSelectors);
    [...ids, "tempMin", "tempMax", "N", "r"].forEach(id => {
      document.getElementById(id).addEventListener("input", updatePlot);
      document.getElementById(id).addEventListener("change", updatePlot);
    });

    fillSelectors();
  </script>
</body>
</html>
